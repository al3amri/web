<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>AskWho | عارض الملفات مع خرائط تفاعلية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        :root {
            --bg: #f4f7fb;
            --surface: #ffffff;
            --text: #1e293b;
            --text-light: #475569;
            --accent: #7c3aed;
            --accent-light: #8b5cf6;
            --border: #e2e8f0;
            --shadow: 0 4px 12px rgba(0,0,0,0.05);
            --radius: 24px;
        }
        body.dark {
            --bg: #0f172a;
            --surface: #1e293b;
            --text: #f1f5f9;
            --text-light: #94a3b8;
            --accent: #a855f7;
            --border: #334155;
            --shadow: 0 4px 12px rgba(0,0,0,0.3);
        }
        body {
            background: var(--bg);
            color: var(--text);
            transition: background 0.2s, color 0.2s;
            padding: 16px;
            min-height: 100vh;
        }
        .container {
            max-width: 1440px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .header h1 {
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .theme-toggle {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 8px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            box-shadow: var(--shadow);
        }
        .input-area {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: var(--shadow);
        }
        textarea {
            width: 100%;
            height: 160px;
            padding: 14px;
            border: 1.5px solid var(--border);
            border-radius: 16px;
            background: var(--bg);
            color: var(--text);
            font-family: monospace;
            direction: ltr;
            resize: vertical;
            font-size: 13px;
            margin-bottom: 16px;
        }
        textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(124,58,237,0.2);
        }
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
            font-size: 0.9rem;
        }
        button.primary {
            background: var(--accent);
            color: white;
            border: none;
        }
        button.primary:hover {
            background: var(--accent-light);
        }
        button:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        .stats {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 60px;
            padding: 6px 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }
        .search-box {
            width: 100%;
            padding: 14px 20px;
            border: 1.5px solid var(--border);
            border-radius: 60px;
            background: var(--surface);
            color: var(--text);
            margin-bottom: 28px;
            padding-right: 50px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="%2394a3b8" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>');
            background-repeat: no-repeat;
            background-position: right 20px center;
        }
        .profiles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 24px;
        }
        .profile-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 28px;
            overflow: hidden;
            transition: 0.25s;
            box-shadow: var(--shadow);
        }
        .carousel {
            position: relative;
            margin: 16px 16px 0 16px;
            border-radius: 24px;
            overflow: hidden;
            background: var(--bg);
            aspect-ratio: 1 / 1;
        }
        .carousel-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: pointer;
        }
        .carousel-nav {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            border-radius: 40px;
            padding: 6px 12px;
            color: white;
            font-size: 0.75rem;
            display: flex;
            gap: 12px;
            z-index: 2;
        }
        .carousel-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            padding: 0 4px;
        }
        .carousel-btn:hover {
            background: rgba(255,255,255,0.2);
        }
        .profile-info {
            padding: 16px 16px 12px;
        }
        .info-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }
        .profile-name {
            font-size: 1.2rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .profile-badge {
            background: var(--accent);
            color: white;
            border-radius: 40px;
            padding: 3px 10px;
            font-size: 0.7rem;
        }
        .profile-id {
            font-size: 0.7rem;
            color: var(--text-light);
            direction: ltr;
        }
        .info-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: var(--text-light);
            flex-wrap: wrap;
        }
        .info-row i {
            width: 22px;
            color: var(--accent);
        }
        .interests {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 12px 0;
        }
        .interest-tag {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 4px 12px;
            font-size: 0.7rem;
        }
        .map-container {
            height: 150px;
            border-radius: 16px;
            overflow: hidden;
            margin: 12px 0;
            background: var(--bg);
            position: relative;
        }
        .map-container .leaflet-container {
            height: 100%;
            width: 100%;
            z-index: 1;
        }
        .actions {
            display: flex;
            gap: 8px;
            padding: 8px 16px 16px;
            border-top: 1px solid var(--border);
            margin-top: 8px;
        }
        .actions button {
            flex: 1;
            padding: 8px;
            font-size: 0.75rem;
            background: var(--bg);
            border: 1px solid var(--border);
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            position: relative;
            max-width: 90vw;
            max-height: 90vh;
        }
        .modal-content img {
            max-width: 100%;
            max-height: 85vh;
            border-radius: 20px;
        }
        .modal-close {
            position: absolute;
            top: -40px;
            left: 0;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            background: rgba(0,0,0,0.5);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            font-size: 2rem;
            cursor: pointer;
            background: rgba(0,0,0,0.5);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-prev { right: -60px; }
        .modal-next { left: -60px; }
        @media (max-width: 768px) {
            .modal-prev { right: 10px; }
            .modal-next { left: 10px; }
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            color: white;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 0.85rem;
            z-index: 2000;
            animation: fadeOut 2s ease forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(10px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
        }
        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--text-light);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-map-marked-alt" style="color:var(--accent);"></i> AskWho · عارض الملفات</h1>
            <div class="theme-toggle" onclick="document.body.classList.toggle('dark')">
                <i class="fas fa-moon"></i> <span>ليلي</span>
            </div>
        </div>

        <div class="input-area">
            <textarea id="jsonInput" placeholder='الصق JSON هنا (يجب أن يحتوي على مصفوفة "data")...' dir="ltr"></textarea>
            <div class="btn-group">
                <button class="primary" onclick="parseData()"><i class="fas fa-play"></i> عرض</button>
                <button onclick="pasteJSON()"><i class="fas fa-paste"></i> لصق</button>
                <button onclick="clearAll()"><i class="fas fa-trash"></i> مسح</button>
                <button onclick="loadSample()"><i class="fas fa-flask"></i> تجربة</button>
            </div>
        </div>

        <div id="stats" class="stats" style="display: none;"></div>
        <input type="text" id="searchInput" class="search-box" placeholder="ابحث بالاسم أو المدينة..." style="display: none;">

        <div id="profilesContainer" class="profiles-grid"></div>
        <div class="footer" style="text-align:center; margin-top:32px; font-size:0.75rem; color:var(--text-light);">
            <p>جميع الحقوق محفوظة | يعرض الخريطة إذا وُجدت إحداثيات</p>
        </div>
    </div>

    <!-- مودال الصور -->
    <div id="imageModal" class="modal" onclick="closeModal(event)">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal(event)">&times;</span>
            <span class="modal-nav modal-prev" onclick="prevModalImage(event)"><i class="fas fa-chevron-right"></i></span>
            <span class="modal-nav modal-next" onclick="nextModalImage(event)"><i class="fas fa-chevron-left"></i></span>
            <img id="modalImage" src="" alt="">
        </div>
    </div>

    <script>
        // متغيرات عامة
        let currentProfiles = [];
        let currentFiltered = [];
        let activeModalImages = [];
        let activeModalIndex = 0;
        let allCarousels = new Map(); // لتخزين مؤشرات الكاروسيل لكل بطاقة

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        window.pasteJSON = async function() {
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById('jsonInput').value = text;
                parseData();
            } catch(e) {
                showToast('تعذر الوصول للحافظة');
            }
        };

        function parseDistance(distanceStr) {
            if (!distanceStr) return Infinity;
            const match = distanceStr.match(/(\d+)/);
            return match ? parseInt(match[1], 10) : Infinity;
        }

        window.parseData = function() {
            const raw = document.getElementById('jsonInput').value.trim();
            if (!raw) { showToast('أدخل JSON أولاً'); return; }
            try {
                const json = JSON.parse(raw);
                let profiles = [];
                if (Array.isArray(json)) profiles = json;
                else if (json.data && Array.isArray(json.data)) profiles = json.data;
                else if (json.result && Array.isArray(json.result)) profiles = json.result;
                else { showToast('JSON لا يحتوي على مصفوفة data صالحة'); return; }

                profiles = profiles.map(p => ({
                    ...p,
                    _distanceNum: parseDistance(p.distance)
                }));
                profiles.sort((a,b) => a._distanceNum - b._distanceNum);

                currentProfiles = profiles;
                currentFiltered = [...profiles];
                renderProfiles(currentFiltered);
                updateStats(profiles.length);
                document.getElementById('stats').style.display = 'flex';
                document.getElementById('searchInput').style.display = 'block';
            } catch(e) {
                showToast('JSON غير صالح: '+e.message);
            }
        };

        function getAllImages(profile) {
            let images = [];
            if (profile.profile_image_imagekit) images.push(profile.profile_image_imagekit);
            if (profile.gallery && Array.isArray(profile.gallery)) {
                images.push(...profile.gallery.filter(url => url && typeof url === 'string'));
            }
            return [...new Map(images.map(url => [url, url])).values()];
        }

        // إنشاء خريطة باستخدام Leaflet
        function initMap(elementId, lat, lng, name) {
            if (!lat || !lng) return null;
            const map = L.map(elementId).setView([lat, lng], 12);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; CartoDB',
                subdomains: 'abcd',
                maxZoom: 19
            }).addTo(map);
            L.marker([lat, lng]).addTo(map).bindPopup(name || 'الموقع').openPopup();
            return map;
        }

        function renderProfiles(profiles) {
            const container = document.getElementById('profilesContainer');
            if (!profiles.length) {
                container.innerHTML = '<div class="empty-state">🚫 لا توجد نتائج مطابقة</div>';
                return;
            }

            // إعادة تعيين الخرائط القديمة (لتجنب تراكم الخرائط)
            if (window._maps) window._maps.forEach(m => m?.remove?.());
            window._maps = [];

            let html = '';
            profiles.forEach((p, idx) => {
                const profileId = p.id || p.local_id || 'غير معروف';
                const name = p.firstname || 'بدون اسم';
                const age = p.age ? `، ${p.age}` : '';
                const city = p.city || '';
                const distance = p.distance || '';
                const nationality = p.nationality || '';
                const zodiac = p.zodiac || '';
                const statusText = p.status || '';
                const mainGoal = p.main_goal?.title || '';
                const mainGoalEmoji = p.main_goal?.emoji || '';
                const personality = p.personality_type?.title || '';
                const relationship = p.relationship_status || '';
                const occupation = p.occupation || '';
                const interests = p.profile_interests || [];
                const allImages = getAllImages(p);
                const hasLocation = p.latitude && p.longitude;
                const mapId = `map-${idx}`;

                html += `
                    <div class="profile-card" data-idx="${idx}">
                        <div class="carousel" id="carousel-${idx}">
                            <img class="carousel-image" src="${allImages[0] || ''}" alt="صورة" onerror="this.src='https://placehold.co/400x400/e2e8f0/475569?text=No+Image'">
                            ${allImages.length > 1 ? `<div class="carousel-nav">
                                <button class="carousel-btn" data-dir="prev">‹</button>
                                <span>1/${allImages.length}</span>
                                <button class="carousel-btn" data-dir="next">›</button>
                            </div>` : ''}
                        </div>
                        <div class="profile-info">
                            <div class="info-header">
                                <div class="profile-name">
                                    ${escapeHtml(name)}${age}
                                    ${mainGoal ? `<span class="profile-badge">${mainGoalEmoji} ${escapeHtml(mainGoal)}</span>` : ''}
                                </div>
                                <div class="profile-id">🆔 ${escapeHtml(String(profileId))}</div>
                            </div>
                            ${city ? `<div class="info-row"><i class="fas fa-map-marker-alt"></i> ${escapeHtml(city)} ${distance ? `· ${escapeHtml(distance)}` : ''}</div>` : ''}
                            ${nationality ? `<div class="info-row"><i class="fas fa-flag"></i> ${escapeHtml(nationality)}</div>` : ''}
                            ${zodiac ? `<div class="info-row"><i class="fas fa-star"></i> ${escapeHtml(zodiac)}</div>` : ''}
                            ${personality ? `<div class="info-row"><i class="fas fa-brain"></i> ${escapeHtml(personality)}</div>` : ''}
                            ${relationship ? `<div class="info-row"><i class="fas fa-heart"></i> ${escapeHtml(relationship)}</div>` : ''}
                            ${occupation ? `<div class="info-row"><i class="fas fa-briefcase"></i> ${escapeHtml(occupation)}</div>` : ''}
                            ${statusText ? `<div class="info-row"><i class="fas fa-comment"></i> ${escapeHtml(statusText)}</div>` : ''}
                            ${interests.length ? `<div class="interests">${interests.map(i => `<span class="interest-tag">${escapeHtml(i.name)}</span>`).join('')}</div>` : ''}
                            <div class="map-container" id="${mapId}">
                                ${hasLocation ? '' : '<div style="text-align:center; padding:50px 0; color:var(--text-light);"><i class="fas fa-map"></i> لا توجد إحداثيات</div>'}
                            </div>
                        </div>
                        <div class="actions">
                            <button onclick="copyId('${escapeHtml(String(profileId))}', event)"><i class="fas fa-id-card"></i> المعرف</button>
                            <button onclick="copyAllImages('${allImages.join(',')}', event)"><i class="fas fa-images"></i> الروابط</button>
                            <button onclick="openGallery(${idx}, 0, event)"><i class="fas fa-expand"></i> معرض</button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;

            // تهيئة الكاروسيل لكل بطاقة (حدث الأزرار)
            profiles.forEach((p, idx) => {
                const allImages = getAllImages(p);
                if (allImages.length <= 1) return;
                const carouselDiv = document.getElementById(`carousel-${idx}`);
                if (!carouselDiv) return;
                const imgEl = carouselDiv.querySelector('.carousel-image');
                const navSpan = carouselDiv.querySelector('.carousel-nav span');
                let currentIdx = 0;
                const update = (newIdx) => {
                    currentIdx = (newIdx + allImages.length) % allImages.length;
                    imgEl.src = allImages[currentIdx];
                    if (navSpan) navSpan.innerText = `${currentIdx+1}/${allImages.length}`;
                };
                const prevBtn = carouselDiv.querySelector('.carousel-btn[data-dir="prev"]');
                const nextBtn = carouselDiv.querySelector('.carousel-btn[data-dir="next"]');
                if (prevBtn) prevBtn.onclick = (e) => { e.stopPropagation(); update(currentIdx-1); };
                if (nextBtn) nextBtn.onclick = (e) => { e.stopPropagation(); update(currentIdx+1); };
            });

            // تهيئة الخرائط لكل بطاقة (تأخير قليل لضمان وجود العناصر)
            setTimeout(() => {
                profiles.forEach((p, idx) => {
                    if (p.latitude && p.longitude) {
                        const mapContainer = document.getElementById(`map-${idx}`);
                        if (mapContainer && !mapContainer._mapInitialized) {
                            const map = initMap(`map-${idx}`, p.latitude, p.longitude, p.firstname);
                            if (map) {
                                window._maps.push(map);
                                mapContainer._mapInitialized = true;
                            }
                        }
                    }
                });
            }, 50);
        }

        // فتح معرض التكبير
        window.openGallery = function(profileIdx, startIndex, event) {
            if (event) event.stopPropagation();
            const profile = currentFiltered[profileIdx];
            if (!profile) return;
            const images = getAllImages(profile);
            if (!images.length) return;
            activeModalImages = images;
            activeModalIndex = startIndex % images.length;
            document.getElementById('modalImage').src = activeModalImages[activeModalIndex];
            document.getElementById('imageModal').style.display = 'flex';
        };

        window.prevModalImage = function(e) {
            e.stopPropagation();
            if (!activeModalImages.length) return;
            activeModalIndex = (activeModalIndex - 1 + activeModalImages.length) % activeModalImages.length;
            document.getElementById('modalImage').src = activeModalImages[activeModalIndex];
        };
        window.nextModalImage = function(e) {
            e.stopPropagation();
            if (!activeModalImages.length) return;
            activeModalIndex = (activeModalIndex + 1) % activeModalImages.length;
            document.getElementById('modalImage').src = activeModalImages[activeModalIndex];
        };
        window.closeModal = function(e) {
            if (e.target.classList.contains('modal') || e.target.classList.contains('modal-close'))
                document.getElementById('imageModal').style.display = 'none';
        };

        window.copyId = function(id, event) {
            if (event) event.stopPropagation();
            navigator.clipboard.writeText(id).then(() => showToast('🆔 تم نسخ المعرف'));
        };
        window.copyAllImages = function(joined, event) {
            if (event) event.stopPropagation();
            const urls = joined.split(',');
            navigator.clipboard.writeText(urls.join('\n')).then(() => showToast(`📸 تم نسخ ${urls.length} رابط`));
        };

        function updateStats(total) {
            const statsDiv = document.getElementById('stats');
            statsDiv.innerHTML = `<div class="stat-card"><i class="fas fa-user-friends"></i> عدد الأشخاص: ${total}</div>`;
        }

        document.getElementById('searchInput')?.addEventListener('input', (e) => {
            const term = e.target.value.trim().toLowerCase();
            if (!term) {
                currentFiltered = [...currentProfiles];
            } else {
                currentFiltered = currentProfiles.filter(p => 
                    (p.firstname && p.firstname.toLowerCase().includes(term)) ||
                    (p.city && p.city.toLowerCase().includes(term)) ||
                    (p.nationality && p.nationality.toLowerCase().includes(term)) ||
                    (p.status && p.status.toLowerCase().includes(term))
                );
            }
            renderProfiles(currentFiltered);

        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        const dropArea = document.getElementById('jsonInput');
        if (dropArea) {
            dropArea.addEventListener('dragover', e => e.preventDefault());
            dropArea.addEventListener('drop', e => {
                e.preventDefault();
                const file = e.dataTransfer.files[0];
                if (file && file.type === 'application/json') {
                    const reader = new FileReader();
                    reader.onload = ev => {
                        dropArea.value = ev.target.result;
                        parseData();
                    };
                    reader.readAsText(file);
                } else showToast('يرجى إسقاط ملف JSON صالح');
